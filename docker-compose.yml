version: "3.9"

services:
  database:
    image: mongo:7
    container_name: ktgkdevops-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ktgk_devops
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
    container_name: ktgkdevops-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      DB_URL: ${DB_URL}
      APP_NAME: ${APP_NAME}
    depends_on:
      - database
    ports:
      - "${PORT}:5000"

  frontend:
    build:
      context: ./frontend
    container_name: ktgkdevops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo-data:
